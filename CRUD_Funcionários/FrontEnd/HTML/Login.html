<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>MVT Network - Login</title>
    <link rel="stylesheet" href="../CSS/Login.css">
</head>

<body>

    <main class="conteiner">
        <form id="form">
            <h1>Gestão de Funcionários</h1>

            <h3>Faça login para continuar</h3>
            <p id="erro" style="color: red;font-size: 12px; text-align: center;"></p>
            <label for="email">E-mail</label><br>
            <input class="campo" type="email" placeholder="E-mail" id="email" required><br>
            <label for="senha">Senha</label><br>
            <input class="campo" type="password" placeholder="Senha" id="senha" required><br><br>

            <div class="esquecer">
                <input type="checkbox" id="pin3">
                <label for="pin3">Lembrar-me</label>
            </div>
            <input id="entrar" class="campo" type="submit" value="Entrar">
        </form>
    </main>

    <script src="../JS/Login.js"></script>
</body>

</html>
