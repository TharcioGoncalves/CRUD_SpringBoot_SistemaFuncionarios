<!DOCTYPE html>
<html lang="pt-br">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>MVT Network - Funcionários</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
      <link rel="stylesheet" href="../CSS/Funcionario.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <link rel="stylesheet" href="../CSS/preloader.css">
</head>

<body style="min-height:100vh !important;" class="w-100">
      <div id="preloader" class="preloader bg-light" style="background-color: #152343 !important;">
        <div class="spinner-border border-4 text-white" role="status" style="width:40px;height:40px;">
            <span class="visually-hidden"></span>
        </div>
    </div>
      <div class="row bar">
            <div class="col-3 side-bar m-0 p-2 ps-4 pt-4 vh-100 position-fixed">
                  <h2 class="text-white fs-6"><img src="../IMG/BackgroundEraser_20260527_082200551.png" alt="" class="img-fluid w-25">MVT Network</h2>
                  <ul class="list-unstyled mt-4 pt-1 d-flex flex-column gap-1">
                        <li><a href="dashboard.html"
                                    class="focus text-decoration-none text-white fs-6 px-2 py-4 rounded-1"><i
                                          class="fa-solid fa-house-chimney"></i><span class="ms-2">Dashboard</span></a>
                        </li>
                        <li><a href="#" class="text-decoration-none text-white fs-6 px-2 py-4 rounded-1"><i
                                          class="fa-solid fa-user"></i><span class="ms-2">Funcionários</span></a></li>
                        <li><a href="cadastro.html" class="text-decoration-none text-white fs-6 px-2 py-4 rounded-1"><i
                                          class="fa-solid fa-user-check"></i><span class="ms-2">Cadastro
                                          Funcionários</span></a></li>
                        <li><a href="Relatorio.html" class="text-decoration-none text-white fs-6 px-2 py-4 rounded-1"><i
                                          class="fa-solid fa-chart-bar"></i><span class="ms-2">Relatório</span></a></li>
            </div>
            <div class="col-9 p-4 ms-auto">
                  <h1 class="fw-bold">Tabela de Funcionários</h1>
                  <p>Funcionário > lista</p>

                  <div class="container">
                        <div>
                              <input type="Search" placeholder="Pesquisar funcionário...">
                              <select class="bn filtrar" id="filtrar">
                                    <option value="todos"><i class="bi bi-filter"></i>Todos</option>
                                    <option value="Suporte Técnico">Suporte Técnico</option>
                                    <option value="Segurança Informática">Segurança Informática</option>
                                    <option value="Telecomunicações">Telecomunicações</option>
                                    <option value="Administração de Finanças">Administração de Finanças</option>
                                    <option value="Recursos Humanos">Recursos Humanos</option>
                              </select>
                              <button class="update-table py-1 px-2" onclick="carregarTabela()"><i
                                          class="fa-solid fa-arrow-rotate-right"></i></button>
                        </div>
                        <div><button type="button" class="new-func"><a href="cadastro.html">Novo
                                          funcionário</a></button></div>

                  </div>
                  <table id="tabelaFuncionarios">
                        <thead>
                              <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>Cargo</th>
                                    <th>Departamento</th>
                                    <th>Salário</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                              </tr>
                        </thead>
                        <tbody id="corpo">
                              
                              </tbodyc>

                  </table>
            </div>
      </div>
      <script src="../JS/funcionario.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
      <script src="../JS/preloader.js"></script>
</body>

</html>
