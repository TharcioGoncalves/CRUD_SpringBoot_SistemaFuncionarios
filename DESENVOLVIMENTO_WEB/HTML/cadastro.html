<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVT Network - Cadastro</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../CSS/Cadastro.css">
</head>

<body>
    <div class="row h-100 m-0 p-0" style="width: 100%;">
        <div class="col-3 side-bar m-0 p-0 px-2 pt-4">
            <h2 class="text-white fs-6"><img src="../IMG/BackgroundEraser_20260527_082200551.png" alt="logo"
                    class="img-fluid w-25"><span>MVT Network</span></h2>
            <ul class="list-unstyled mt-4 pt-1 d-flex flex-column gap-1">
                <li><a href="dashboard.html" class="focus text-decoration-none text-white fs-6 px-2  py-3 rounded-1 mx-0"><i
                            class="fa-solid fa-house-chimney"></i><span class="ms-2">Dashboard</span></a></li>
                <li><a href="Funcionario.html" class="text-decoration-none text-white fs-6 px-2 py-3 rounded-1"><i
                            class="fa-solid fa-user"></i><span class="ms-2">Funcionários</span></a></li>
                <li><a href="#" class="text-decoration-none text-white fs-6 px-2 py-3 rounded-1"><i
                            class="fa-solid fa-user-check"></i><span class="ms-2">Cadastro Funcionários</span></a></li>
                <li><a href="Relatorio.html" class="text-decoration-none text-white fs-6 px-2 py-3 rounded-1"><i
                            class="fa-solid fa-chart-bar"></i><span class="ms-2">Relatório</span></a></li>
                <li><a href="Configuracoes.html" class="text-decoration-none text-white fs-6 px-2 py-3 rounded-1"><i
                            class="fa-solid fa-gear"></i><span class="ms-2">Configurações</span></a></li>
            </ul>
        </div>
        <div class="col-8">
            <div class="main-container my-2">
                <header>
                    <h1 id="tituloCadastro">Cadastro de Funcionário</h1>
                    <span>MVT Network > Gestão de RH > Novo Registro</span>
                </header>

                <form id="formulario" action="../HTML/Funcionario.html" method="POST">
                    <div class="form-section">
                        <div class="section-title">DADOS PESSOAIS</div>

                        <div class="row">
                            <div class="field"><input type="hidden" id="id"></div>
                        </div>
                        <div class="row">
                            <div class="field" style="flex: 2;">
                                <label>Nome Completo</label>
                                <input type="text" placeholder="Ex: Viviane Silva" required id="nome">
                            </div>
                            <div class="field">
                                <label>Nº do Bilhete (BI)</label>
                                <input type="text" placeholder="000000000LA000" required id="bi">
                            </div>
                        </div>

                        <div class="row">
                            <div class="field">
                                <label>Data de Nascimento</label>
                                <input type="date" required id="dataNascimento">
                            </div>
                            <div class="field">
                                <label>Gênero</label>
                                <select required id="genero">
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="Femenino">Feminino</option>
                                    <option value="Masculino">Masculino</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Estado Civil</label>
                                <select required id="estadoCivil">
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="Solteiro">Solteiro(a)</option>
                                    <option value="Casado">Casado(a)</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="field">
                                <label>Telemóvel</label>
                                <input type="tel" placeholder="9xx xxx xxx" required id="telefone">
                            </div>
                            <div class="field" style="flex: 1.5;">
                                <label>Gmail / E-mail</label>
                                <input type="email" placeholder="usuario@gmail.com" required id="email">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">ENDEREÇO E LOCALIZAÇÃO</div>
                        <div class="row">
                            <div class="field">
                                <label>Cidade</label>
                                <input type="text" placeholder="Ex: Luanda" required id="cidade">
                            </div>
                            <div class="field">
                                <label>Bairro</label>
                                <input type="text" placeholder="Ex: Cazenga" required id="bairro">
                            </div>
                        </div>
                        <div class="row">
                            <div class="field">
                                <label>Endereço Completo (Rua, Casa nº, Referência)</label>
                                <input type="text" placeholder="Prédio, Piso, Porta..." required id="endereco">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">DADOS PROFISSIONAIS</div>
                        <div class="row">
                            <div class="field">
                                <label>Department</label>
                                <select required id="departamento">
                                    <option value="" disabled selected>Seleciona o Departamento</option>
                                    <option value="Suporte Técnico">Suporte Técnico</option>
                                    <option value="Segurança Informática">Segurança Informática</option>
                                    <option value="Telecomunicações">Telecomunicações</option>
                                    <option value="Administração de Finanças">Administração de Finanças</option>
                                    <option value="Recursos Humanos">Recursos Humanos</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Cargo</label>
                                <input type="text" id="cargo" placeholder="Cargo">
                            </div>
                        </div>
                        <div class="field">
                            <label for="">Salário Base (KZ)</label>
                            <input type="number" placeholder="0.00" step="0.01" required id="salario">
                        </div>
                    </div>

                    <div class="actions">
                        <button type="button" class="btn-cancel" id="apagar">Apagar</button>
                        <button type="submit" class="btn-save" id="save">SALVAR</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="../JS/Cadastro.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
