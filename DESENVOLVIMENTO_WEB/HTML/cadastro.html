<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVT Network - Cadastro</title>
    <link rel="stylesheet" href="../CSS/Cadastro.css">
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Cadastro de Funcionário</h1>
            <span>MVT Network > Gestão de RH > Novo Registro</span>
        </header>

        <form>
            <div class="form-section">
                <div class="section-title">DADOS PESSOAIS</div>
                
                <div class="row">
                    <div class="field" style="flex: 2;">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Ex: Viviane Silva" required>
                    </div>
                    <div class="field">
                        <label>Nº do Bilhete (BI)</label>
                        <input type="text" placeholder="000000000LA000" required>
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label>Data de Nascimento</label>
                        <input type="date" required>
                    </div>
                    <div class="field">
                        <label>Gênero</label>
                        <select required>
                            <option value="" disabled selected>Selecione</option>
                            <option value="F">Feminino</option>
                            <option value="M">Masculino</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Estado Civil</label>
                        <select required>
                            <option value="" disabled selected>Selecione</option>
                            <option value="S">Solteiro(a)</option>
                            <option value="C">Casado(a)</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label>Telemóvel</label>
                        <input type="tel" placeholder="9xx xxx xxx" required>
                    </div>
                    <div class="field" style="flex: 1.5;">
                        <label>Gmail / E-mail</label>
                        <input type="email" placeholder="usuario@gmail.com" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">ENDEREÇO E LOCALIZAÇÃO</div>
                <div class="row">
                    <div class="field">
                        <label>Cidade</label>
                        <input type="text" placeholder="Ex: Luanda" required>
                    </div>
                    <div class="field">
                        <label>Bairro</label>
                        <input type="text" placeholder="Ex: Cazenga" required>
                    </div>
                </div>
                <div class="row">
                    <div class="field">
                        <label>Endereço Completo (Rua, Casa nº, Referência)</label>
                        <input type="text" placeholder="Prédio, Piso, Porta..." required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">DADOS PROFISSIONAIS</div>
                <div class="row">
                    <div class="field">
                        <label>Department</label>
                        <select required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="infra">IT Infrastructure</option>
                            <option value="cyber">Cybersecurity</option>
                            <option value="dev">Software Development</option>
                            <option value="hr">Human Resources</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Cargo</label>
                        <input type="text" placeholder="Ex: Network Engineer" required>
                    </div>
                </div>
                <div class="field">
                    <label for="">Salário Base (KZ)</label>
                    <input type="number" placeholder="0.00" step="0.01" required>
                </div>
            </div>

            <div class="actions">
                <button type="button" class="btn-cancel">CANCELAR</button>
                <button type="submit" class="btn-save">SALVAR FUNCIONÁRIO</button>
            </div>
        </form>
    </div>

</body>
</html>
