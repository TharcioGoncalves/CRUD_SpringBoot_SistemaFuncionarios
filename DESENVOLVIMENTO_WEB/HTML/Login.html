<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN </title>
    <link rel="stylesheet" href="../CSS/Login.css">
</head>

<body>

    <main class="conteiner">
        <form>
            <h1>Gestão de Funcionários</h1>

            <h3>Faça login para continuar</h3>
            <label for="email">E-mail</label><br>
            <input class="campo" type="email" placeholder="E-mail" id="email" required><br>
            <label for="senha">Senha</label><br>
            <input class="campo" type="password" placeholder="Senha" id="senha" required><br><br>

            <div class="esquecer">
                <input type="checkbox" id="pin3">
                <label for="pin3">Lembrar-me</label>
            </div>
            <input id="entrar" class="campo" type="submit" value="Entrar">

            <div>
                <a href="recuperar-senha" class="esqueceu">Esqueci minha senha</a>
            </div>

        </form>
    </main>

</body>

</html>
